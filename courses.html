<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Courses - SkillLaunch</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

/* 🌌 Background */
body{
background: radial-gradient(circle at top,#1e3a8a,#020617);
color:white;
font-family:sans-serif;
}

/* 🧊 Glass */
.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(14px);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
}

/* 🎴 3D */
.card{
transition:0.4s;
transform-style:preserve-3d;
}
.card:hover{
transform: rotateY(10deg) rotateX(6deg) scale(1.05);
}

/* 🔘 Button */
.btn{
background: linear-gradient(45deg,#6366f1,#22c55e);
padding:10px 18px;
border-radius:10px;
transition:0.3s;
display:inline-block;
}
.btn:hover{
box-shadow:0 0 20px #6366f1;
}

/* 🔍 Search */
.search{
background:white;
color:black;
padding:12px;
border-radius:10px;
width:100%;
}

/* 🎯 Filter */
.filter-btn{
padding:8px 14px;
border-radius:8px;
background:rgba(255,255,255,0.1);
transition:0.3s;
}
.filter-btn:hover{
background:#6366f1;
}

/* 🖼️ Image */
.course-img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
margin-bottom:12px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="text-center py-12 px-4">

<h1 class="text-4xl md:text-5xl font-bold mb-4 text-indigo-400">
🎓 Courses
</h1>

<p class="text-gray-300">
Upgrade your skills with top courses
</p>

</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4">

<!-- 🔍 SEARCH -->
<input 
id="searchInput"
onkeyup="searchCourses()"
placeholder="🔍 Search courses..."
class="search mb-6"
/>

<!-- 🎯 FILTER -->
<div class="flex flex-wrap gap-3 mb-8 justify-center">

<button onclick="filterCourses('all')" class="filter-btn">All</button>
<button onclick="filterCourses('frontend')" class="filter-btn">Frontend</button>
<button onclick="filterCourses('backend')" class="filter-btn">Backend</button>
<button onclick="filterCourses('ai')" class="filter-btn">AI</button>

</div>

<!-- 📦 GRID -->
<div id="courses" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

<!-- SAMPLE CARD -->
<div class="course-card glass card p-4" data-category="frontend">

<img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee" class="course-img">

<h3 class="text-xl font-bold mb-2">React Course</h3>

<p class="text-gray-300 mb-3">Learn modern frontend development</p>

<a href="https://react.dev" target="_blank" class="btn">
Start Course
</a>

</div>

<div class="course-card glass card p-4" data-category="backend">

<img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c" class="course-img">

<h3 class="text-xl font-bold mb-2">Node.js Course</h3>

<p class="text-gray-300 mb-3">Build backend APIs</p>

<a href="https://nodejs.org" target="_blank" class="btn">
Start Course
</a>

</div>

<div class="course-card glass card p-4" data-category="ai">

<img src="https://images.unsplash.com/photo-1526378722484-bd91ca387e72" class="course-img">

<h3 class="text-xl font-bold mb-2">Python AI</h3>

<p class="text-gray-300 mb-3">AI & Data Science</p>

<a href="https://python.org" target="_blank" class="btn">
Start Course
</a>

</div>

</div>

</div>

<!-- FOOTER -->
<footer class="text-center p-10 mt-16 text-gray-400">
© 2026 SkillLaunch — Learn. Build. Get Hired.
</footer>

<!-- 🔥 SCRIPT -->
<script>

// SEARCH
function searchCourses(){
let input = document.getElementById("searchInput").value.toLowerCase()
let cards = document.querySelectorAll(".course-card")

cards.forEach(card=>{
let text = card.innerText.toLowerCase()
card.style.display = text.includes(input) ? "block" : "none"
})
}

// FILTER
function filterCourses(category){
let cards = document.querySelectorAll(".course-card")

cards.forEach(card=>{
if(category==="all" || card.dataset.category===category){
card.style.display="block"
}else{
card.style.display="none"
}
})
}

</script>

</body>
</html>
