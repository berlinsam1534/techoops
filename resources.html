<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resources - SkillLaunch</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* 🌌 Background */
body{
background: radial-gradient(circle at top,#1e3a8a,#020617);
color:white;
font-family:sans-serif;
}

/* 🧊 Glass Effect */
.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(14px);
border:1px solid rgba(255,255,255,0.15);
border-radius:18px;
}

/* 🎴 3D Card */
.card{
transition:0.4s;
transform-style:preserve-3d;
}

.card:hover{
transform: rotateY(10deg) rotateX(6deg) scale(1.05);
}

/* 🔘 Button */
.btn{
background:linear-gradient(45deg,#6366f1,#22c55e);
padding:10px 18px;
border-radius:10px;
transition:0.3s;
display:inline-block;
}

.btn:hover{
box-shadow:0 0 20px #6366f1;
}

/* 🔍 Search */
.search{
background:white;
color:black;
border-radius:10px;
padding:12px;
width:100%;
}

</style>

</head>

<body>

<!-- NAV -->
<nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">

<h1 class="text-2xl font-bold text-indigo-400">
SkillLaunch 🚀
</h1>

<a href="index.html" class="btn">Home</a>

</nav>

<!-- HEADER -->
<div class="text-center py-10">

<h1 class="text-4xl md:text-5xl font-bold mb-4">
📚 Explore Resources
</h1>

<p class="text-gray-300">
Find PDFs, guides & notes easily
</p>

</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4">

<!-- SEARCH -->
<input 
id="searchInput"
onkeyup="searchResources()"
placeholder="🔍 Search resources..."
class="search mb-6"
/>

<!-- FILTER -->
<div class="flex flex-wrap gap-3 mb-8 justify-center">

<button onclick="filterCategory('all')" class="btn">All</button>
<button onclick="filterCategory('web')" class="btn">Web Dev</button>
<button onclick="filterCategory('python')" class="btn">Python</button>

</div>

<!-- GRID -->
<div id="resourceContainer"
class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

<!-- CARD 1 -->
<div class="resource-card glass card p-6 text-center" data-category="web">

<h3 class="text-xl font-bold mb-3">
React Guide
</h3>

<p class="text-gray-300 mb-4">
Frontend framework notes
</p>

<a href="https://ffvknewokvkgipzcacwk.supabase.co/storage/v1/object/public/resources/react_guide.pdf"
target="_blank"
class="btn">

View Resource

</a>

</div>

<!-- CARD 2 -->
<div class="resource-card glass card p-6 text-center" data-category="python">

<h3 class="text-xl font-bold mb-3">
Python Notes
</h3>

<p class="text-gray-300 mb-4">
AI & Data Science basics
</p>

<a href="https://ffvknewokvkgipzcacwk.supabase.co/storage/v1/object/public/resources/python_notes.pdf"
target="_blank"
class="btn">

View Resource

</a>

</div>

<!-- CARD 3 -->
<div class="resource-card glass card p-6 text-center" data-category="web">

<h3 class="text-xl font-bold mb-3">
JavaScript Guide
</h3>

<p class="text-gray-300 mb-4">
Core JS concepts
</p>

<a href="https://ffvknewokvkgipzcacwk.supabase.co/storage/v1/object/public/resources/javascript_notes.pdf"
target="_blank"
class="btn">

View Resource

</a>

</div>

</div>

</div>

<!-- FOOTER -->
<footer class="text-center p-10 mt-16 text-gray-400">

© 2026 SkillLaunch — Learn. Build. Get Hired.

</footer>

<!-- SCRIPT -->
<script>

function searchResources(){
let input = document.getElementById("searchInput").value.toLowerCase()
let cards = document.querySelectorAll(".resource-card")

cards.forEach(card=>{
let text = card.innerText.toLowerCase()

card.style.display = text.includes(input) ? "block" : "none"
})
}

function filterCategory(category){
let cards = document.querySelectorAll(".resource-card")

cards.forEach(card=>{
if(category==="all" || card.dataset.category===category){
card.style.display="block"
}else{
card.style.display="none"
}
})
}

</script>

</body>
</html>
